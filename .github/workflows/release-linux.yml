name: Release VSIX on Linux

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Test, package, and release on Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Validate release version
        id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Release tag '$RELEASE_TAG' must match vX.Y.Z."
              exit 1
          fi

          tag_version="${RELEASE_TAG#v}"
          package_version="$(node -p "require('./package.json').version")"
          lock_version="$(node -p "require('./package-lock.json').version")"
          lock_root_version="$(node -p "require('./package-lock.json').packages[''].version")"

          if [[ "$package_version" != "$tag_version" ||
                "$lock_version" != "$tag_version" ||
                "$lock_root_version" != "$tag_version" ]]; then
              echo "::error::Tag version '$tag_version' must match package.json and package-lock.json."
              exit 1
          fi

          echo "version=$tag_version" >> "$GITHUB_OUTPUT"
          echo "vsix=csky-cdk-assistant-$tag_version.vsix" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: xvfb-run -a npm test

      - name: Package VSIX
        env:
          VSIX_NAME: ${{ steps.release.outputs.vsix }}
        run: npm run package -- --out "$VSIX_NAME"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          VSIX_NAME: ${{ steps.release.outputs.vsix }}
        run: gh release create "$RELEASE_TAG" "$VSIX_NAME" --verify-tag --generate-notes
